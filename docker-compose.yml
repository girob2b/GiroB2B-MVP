# ═══════════════════════════════════════════════════════════════════════════════
# GiroB2B — Docker Compose local (monorepo)
# ───────────────────────────────────────────────────────────────────────────────
#
#  COMO USAR:
#
#    Só o app principal (web + api):
#      docker compose --profile girob2b up
#
#    Só a landing page:
#      docker compose --profile landing up
#
#    Stack legada (Express + Vite + MySQL):
#      docker compose --profile legacy up
#
#    Tudo junto:
#      docker compose --profile full up
#
#    Background:  adicione -d    |    Rebuild forçado: adicione --build
#    Após mudar dependências (package.json):
#      docker compose --profile girob2b down -v && docker compose --profile girob2b up --build
#
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ── PRINCIPAL: Next.js (apps/web) ────────────────────────────────────────────
  girob2b-app:
    profiles: [girob2b, full]
    build:
      context: .                        # raiz do monorepo
      dockerfile: apps/web/Dockerfile
      target: dev
    container_name: girob2b-app
    working_dir: /repo/apps/web
    ports:
      - "4000:3000"
    env_file:
      - ./apps/web/.env.local
    volumes:
      - .:/repo                                       # monorepo inteiro (hot-reload web + shared)
      - girob2b_web_nm:/repo/node_modules             # node_modules raiz (workspace links)
      - girob2b_web_app_nm:/repo/apps/web/node_modules
      - girob2b_web_next:/repo/apps/web/.next
    environment:
      NEXT_PUBLIC_APP_URL: "http://localhost:4000"
      NEXT_PUBLIC_BACKEND_URL: "http://localhost:4001"
      BACKEND_URL: "http://girob2b-backend:3001"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - girob2b-backend
    restart: unless-stopped

  # ── PRINCIPAL: Fastify API (apps/api) ────────────────────────────────────────
  girob2b-backend:
    profiles: [girob2b, full]
    build:
      context: .                        # raiz do monorepo
      dockerfile: apps/api/Dockerfile
      target: dev
    container_name: girob2b-backend
    working_dir: /repo/apps/api
    ports:
      - "4001:3001"
    env_file:
      - ./apps/api/.env
    volumes:
      - .:/repo                                       # monorepo inteiro (hot-reload api + shared)
      - girob2b_api_nm:/repo/node_modules             # node_modules raiz (workspace links)
      - girob2b_api_app_nm:/repo/apps/api/node_modules
    environment:
      PORT: "3001"
      NODE_ENV: "development"
    restart: unless-stopped

  # ── SCRAPER: microsserviço de descoberta web (apps/scraper) ──────────────────
  girob2b-scraper:
    profiles: [girob2b, full, scraper]
    build:
      context: .
      dockerfile: apps/scraper/Dockerfile
      target: dev
    container_name: girob2b-scraper
    working_dir: /repo/apps/scraper
    ports:
      - "4002:3002"
    env_file:
      - ./apps/scraper/.env
    volumes:
      - .:/repo
      - girob2b_scraper_nm:/repo/node_modules
      - girob2b_scraper_app_nm:/repo/apps/scraper/node_modules
    environment:
      PORT: "3002"
      NODE_ENV: "development"
    depends_on:
      - girob2b-redis
      - girob2b-searxng
    restart: unless-stopped

  # ── SCRAPER: Redis (BullMQ + cache) ─────────────────────────────────────────
  girob2b-redis:
    profiles: [girob2b, full, scraper]
    image: redis:7-alpine
    container_name: girob2b-redis
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "noeviction"]
    ports:
      - "6379:6379"
    volumes:
      - girob2b_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── SCRAPER: SearXNG (meta-search engine self-hosted) ───────────────────────
  girob2b-searxng:
    profiles: [girob2b, full, scraper]
    image: searxng/searxng:latest
    container_name: girob2b-searxng
    ports:
      - "8888:8080"
    volumes:
      - ./apps/scraper/searxng:/etc/searxng:rw
    environment:
      SEARXNG_BASE_URL: "http://localhost:8888/"
      BIND_ADDRESS: "0.0.0.0:8080"
      UWSGI_WORKERS: "2"
      UWSGI_THREADS: "4"
    cap_drop: ["ALL"]
    cap_add: ["CHOWN", "SETGID", "SETUID"]
    restart: unless-stopped

  # ── LANDING PAGE (React + Vite) ───────────────────────────────────────────────
  landing-page:
    profiles: [landing, full]
    build:
      context: ../_legacy/saas-landing-page
      dockerfile: Dockerfile
    container_name: girob2b-landing
    ports:
      - "3030:3030"
    volumes:
      - ../_legacy/saas-landing-page:/app
      - landing_nm:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
    restart: unless-stopped

  # ── LEGADA: MySQL 8.4 ─────────────────────────────────────────────────────────
  mysql:
    profiles: [legacy, full]
    image: mysql:8.4
    container_name: bmarket-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: b2b_saas
    volumes:
      - bmarket-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  # ── LEGADA: Express API ───────────────────────────────────────────────────────
  legacy-backend:
    profiles: [legacy, full]
    build:
      context: ../_legacy/backend
      dockerfile: Dockerfile
    container_name: bmarket-backend
    env_file:
      - ../_legacy/backend/.env
    environment:
      DATABASE_URL: mysql://root:root@mysql:3306/b2b_saas
      PORT: "4000"
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "4000:4000"
    restart: unless-stopped

  # ── LEGADA: React + Vite frontend ─────────────────────────────────────────────
  legacy-frontend:
    profiles: [legacy, full]
    build:
      context: ../_legacy/frontend
      dockerfile: Dockerfile
    container_name: bmarket-frontend
    depends_on:
      - legacy-backend
    environment:
      VITE_API_PROXY_TARGET: http://legacy-backend:4000
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ../_legacy/frontend:/app
      - legacy_frontend_nm:/app/node_modules
    ports:
      - "5173:5173"
    restart: unless-stopped

volumes:
  girob2b_web_nm:
  girob2b_web_app_nm:
  girob2b_web_next:
  girob2b_api_nm:
  girob2b_api_app_nm:
  girob2b_scraper_nm:
  girob2b_scraper_app_nm:
  girob2b_redis_data:
  landing_nm:
  bmarket-mysql-data:
  legacy_frontend_nm:
