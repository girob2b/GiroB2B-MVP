# Subir só a landing page:
#   docker compose -f docker-compose.landing-page.yml up --build
services:
  landing-page:
    build:
      context: ./_legacy/saas-landing-page
      dockerfile: Dockerfile
    container_name: girob2b-landing
    ports:
      - "3030:3030"
    volumes:
      - ./_legacy/saas-landing-page:/app
      - landing_nm:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
    restart: unless-stopped

volumes:
  landing_nm:
