# Subir só o girob2b:
#   docker compose -f docker-compose.girob2b.yml up --build
services:
  girob2b:
    build:
      context: ./girob2b
      dockerfile: Dockerfile
      target: dev
    container_name: girob2b-app
    ports:
      - "3000:3000"
    env_file:
      - ./girob2b/.env.local
    volumes:
      - ./girob2b:/app
      - girob2b_nm:/app/node_modules
      - girob2b_next:/app/.next
    environment:
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    restart: unless-stopped

volumes:
  girob2b_nm:
  girob2b_next:
