name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela jobs duplicados no mesmo branch (último push vence)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Web (Next.js) — type-check + lint + build ─────────────────────────────
  web:
    name: Web (type-check + lint + build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install (frozen)
        run: pnpm install --frozen-lockfile
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Type-check
        run: pnpm --filter @girob2b/web exec tsc --noEmit

      - name: Lint
        run: pnpm --filter @girob2b/web lint

      - name: Build (Next.js)
        run: pnpm --filter @girob2b/web build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          # Envs públicos do Supabase precisam estar nos secrets do repo.
          # Service role só vai pra steps que precisam (não pra build estático).
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_APP_NAME: GiroB2B
          AUTH_REDIRECT_BASE_URL: http://localhost:3000

  # ─── E2E (Playwright) — fluxos críticos ────────────────────────────────────
  # Os specs que dependem de seed (slugs hardcoded) ainda quebram em CI até
  # globalSetup com Supabase local + seed estar em pé. Por isso roda só os
  # specs estáveis (ex: validações client-side puras) via filtro.
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install (frozen)
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @girob2b/web exec playwright install --with-deps chromium

      - name: Run E2E (specs sem dependência de seed)
        # Lista explícita de specs que NÃO dependem de seed do banco.
        # Ao adicionar novos specs autenticados, atualizar esta lista ou
        # garantir que o globalSetup do Playwright cuide do seed.
        run: pnpm --filter @girob2b/web exec playwright test tests/e2e/auth-validation.spec.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

# ─── Branch protection (configurar manualmente no GitHub) ───────────────────
# Settings → Branches → Add rule for `main`:
#   - Require status checks to pass before merging
#     - Web (type-check + lint + build)
#     - E2E (Playwright)
#   - Require branches to be up to date before merging
#   - Do not allow force pushes
