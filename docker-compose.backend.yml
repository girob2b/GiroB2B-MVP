# Subir só o backend legado (Express + MySQL):
#   docker compose -f docker-compose.backend.yml up --build
services:
  mysql:
    image: mysql:8.4
    container_name: bmarket-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: b2b_saas
    volumes:
      - bmarket-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  legacy-backend:
    build:
      context: ./_legacy/backend
      dockerfile: Dockerfile
    container_name: bmarket-backend
    env_file:
      - ./_legacy/backend/.env
    environment:
      DATABASE_URL: mysql://root:root@mysql:3306/b2b_saas
      PORT: "4000"
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "4000:4000"
    restart: unless-stopped

volumes:
  bmarket-mysql-data:
